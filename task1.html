<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Website</title>

<style>
/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    padding:20px;
}

/* 1. Mobile First Navbar */
nav{
    display:flex;
    flex-direction:column;
    background-color:#f2f2f2;
    padding:10px;
}

nav a{
    text-decoration:none;
    color:black;
    padding:10px;
}

/* Desktop Navbar */
@media (min-width:768px){
    nav{
        flex-direction:row;
        gap:20px;
    }
}

/* 2. H1 */
h1{
    margin:20px 0;
}

/* 3. Image */
img{
    width:250px;
    border-radius:20px; /* Odd Roll Number */
    display:block;
    margin-bottom:20px;
}

/* 4. Video */
video{
    width:50vw;
    padding:10px;
    background-color:green; /* Roll No ends with 5 */
    display:block;
    margin-bottom:20px;
}

/* 5. Table */
table{
    width:100%;
    border-collapse:collapse;
    margin:20px 0;
}

th, td{
    border:1px solid black;
    padding:10px;
    text-align:center;
}

th{
    background-color:lightgreen;
}

/* 6. Button */
button{
    border:none;
    padding:12px 20px;
    background-color:green; /* Same as video */
    color:white;
    cursor:pointer;
    margin:20px 0;
    transition:0.3s;
}

button:hover{
    background-color:darkgreen;
    transform:scale(1.05);
}

/* 8. Desktop First Grid */
.grid-container{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:20px;
}

.box{
    background-color:#d9d9d9;
    padding:20px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* Mobile Grid */
@media (max-width:767px){
    .grid-container{
        grid-template-columns:repeat(2,1fr);
    }
}
</style>
</head>

<body>

    <!-- Navbar -->
    <nav>
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Heading -->
    <h1>Responsive Website Assignment</h1>

    <!-- Image -->
    <img src="first.jpg" alt="Penguin Image">

    <!-- Video -->
    <video controls>
        <source src="samplevdo.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <!-- Table -->
    <table>
        <tr>
            <th>1</th>
            <th>2</th>
            <th>3</th>
        </tr>
        <tr>
            <td>shin chan</td>
            <td>doremon</td>
            <td>dora</td>
        </tr>
        <tr>
            <td>ninja hatori</td>
            <td>Chotta bheem</td>
            <td>pokemon</td>
        </tr>
    </table>

    <!-- Button -->
    <button>Click Me</button>

    <!-- Grid -->
    <div class="grid-container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
    </div>
</body>
</html>
